<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="form-header">
        <div class="container container--flex">

            <img  
            src="/images/Vector.svg" 
            alt="imagem de um usuário ilustrativo"
            class="form-header__image-perfil"
            />
            <h1 class="form-header__title">Contact Form</h1>
            <p class="form-header__text">Insira os dados do contato e clique em cadastar</p>

        </div>
    </header>

<main>

    <div class="container">
        <form class="form-contact" action="">
            <div class="form-contact__linha">

                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="nome">Nome</label>
                </div>
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__input--metade" type="text" placeholder="Nome" id="nome" name="nome">
                    <input class="form-contact__input form-contact__input--metade" type="text" placeholder="sobrenome" id="sobrenome" name="sobrenome">
                </div>

            </div>

            <div class="form-contact__linha">

                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="nome">Email</label>
                </div>
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__input--metade" type="text" placeholder="Ex: abc@email.com" id="email" name="email">
                </div>

            </div>

            <div class="form-contact__linha">

                <div class="form-contact__col-a">
                    <label class="form-contact__label" for="nome">Telefone</label>
                </div>
                <div class="form-contact__col-b">
                    <input class="form-contact__input form-contact__input--metade" type="text" placeholder="+55" id="email" name="email">
                    <input class="form-contact__input form-contact__input--metade" type="text" placeholder="ddd" id="email" name="email">
                    <input class="form-contact__input form-contact__input--metade" type="text" placeholder="ex: 99999-9999" id="email" name="email">
                </div>

            </div>
        </form>
    </div>

</main>

    <footer>
        Todos os direitos reservados
    </footer>

</body>
</html>
