<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function saudacao(){
            alert(`Título: ${document.getElementById('titulo').textContent}`);
        }

        function mouseMove(){
            alert("Mouse se moveu no botão");
        }

        function clicouBaixo(){
            alert("Você segurou o botão");
        }
        function clicouSubiu(){
            alert("Você soltou o botão do mouse");
        }
        function clicouDuas(){
            alert("Você apertou duas vezes");
        }
    </script>
   
</head>
<body>
    <h1 id="titulo">Olá, eu sou o título da página</h1>
    <button onclick="saudacao()">Click aqui</button><br>
    <button onmousemove=" mouseMove()">Passe o mouse</button><br>
    <button onmousedown=" clicouBaixo()">Segura o click</button><br>
    <button onmouseup=" clicouSubiu()">Solta o botão</button> <br>
    <button ondblclick=" clicouDuas()">dois click</button> <br>
</body>
</html>
